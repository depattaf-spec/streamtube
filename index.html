<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StreamTube</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">♫ StreamTube</div>
    <div class="auth-tabs">
      <button id="login-tab" class="auth-tab active" onclick="switchAuthTab('login')">Sign In</button>
      <button id="signup-tab" class="auth-tab" onclick="switchAuthTab('signup')">Sign Up</button>
    </div>
    <div id="login-form" class="auth-form">
      <input id="login-email" type="email" placeholder="Email" />
      <input id="login-pass" type="password" placeholder="Password" />
      <p id="login-error" class="form-error"></p>
      <button class="btn btn-green btn-full" onclick="login()">Sign In</button>
    </div>
    <div id="signup-form" class="auth-form" style="display:none">
      <input id="signup-email" type="email" placeholder="Email" />
      <input id="signup-pass" type="password" placeholder="Password" />
      <p id="signup-error" class="form-error"></p>
      <button class="btn btn-green btn-full" onclick="signup()">Create Account</button>
    </div>
  </div>
</div>

<!-- APP SCREEN -->
<div id="app-screen" style="display:none">

  <!-- SIDEBAR -->
  <nav id="sidebar">
    <div class="sidebar-logo">♫ StreamTube</div>
    <ul class="nav-list">
      <li id="home-tab" class="nav-item" onclick="switchTab('home')">
        <span class="nav-icon">🏠</span> Home
      </li>
      <li id="search-tab" class="nav-item" onclick="switchTab('search')">
        <span class="nav-icon">🔍</span> Search
      </li>
      <li id="favorites-tab" class="nav-item" onclick="switchTab('favorites')">
        <span class="nav-icon">❤️</span> Favorites
      </li>
      <li id="playlists-tab" class="nav-item" onclick="switchTab('playlists')">
        <span class="nav-icon">📋</span> Playlists
      </li>
    </ul>
    <div class="sidebar-user">
      <span class="user-icon">👤</span>
      <span id="user-email" class="user-email-text"></span>
      <button class="btn-signout" onclick="logout()">Sign out</button>
    </div>
  </nav>

  <!-- MAIN CONTENT -->
  <main id="main-content">

    <!-- HOME VIEW -->
    <div id="home-view">
      <div class="view-header"><h1>Good listening 🎵</h1></div>
      <div class="home-section" id="recently-played-section" style="display:none">
        <h2 class="section-title">Recently Played</h2>
        <div id="recently-played-container" class="recents-row"></div>
      </div>
      <div class="home-section" id="recommendations-section" style="display:none">
        <h2 class="section-title">Recommended For You</h2>
        <div id="recommendations-container" class="songs-grid"></div>
      </div>
      <div class="home-section">
        <h2 class="section-title">Featured Collections</h2>
        <div id="featured-container"></div>
      </div>
    </div>

    <!-- SEARCH VIEW -->
    <div id="search-view" style="display:none">
      <div class="search-bar-wrap">
        <input id="search-input" class="search-input" placeholder="Search for songs, artists, albums…"
          onkeydown="if(event.key==='Enter') searchYouTube()" />
        <button class="btn btn-green" onclick="searchYouTube()">Search</button>
      </div>
      <div id="search-results"></div>
      <div id="search-suggestions"></div>
    </div>

    <!-- FAVORITES VIEW -->
    <div id="favorites-view" style="display:none">
      <div class="view-header"><h1>❤️ Favorites</h1></div>
      <div id="favorites-container"></div>
    </div>

    <!-- PLAYLISTS VIEW -->
    <div id="playlists-view" style="display:none">
      <div class="view-header"><h1>📋 Playlists</h1></div>
      <div id="playlists-container"></div>
    </div>

    <!-- PLAYLIST DETAIL VIEW -->
    <div id="playlist-detail-view" style="display:none"></div>

  </main>

  <!-- QUEUE PANEL -->
  <aside id="queue-panel">
    <div class="queue-header">
      <span>Up Next</span>
      <button class="queue-close" onclick="toggleQueuePanel()">✕</button>
    </div>
    <div id="queue-list"></div>
  </aside>

</div>

<!-- PLAYER BAR -->
<div id="player-bar" style="display:none">
  <div class="player-info">
    <img id="player-thumb" src="" alt="" />
    <div class="player-text">
      <div id="player-title" class="player-title">Nothing playing</div>
      <div id="player-channel" class="player-channel"></div>
    </div>
    <button class="btn-fav-player" id="player-fav-btn" onclick="favCurrentSong()" title="Add to favorites">♡</button>
  </div>
  <div class="player-center">
    <div class="control-row">
      <button id="shuffle-btn" class="ctrl-btn" onclick="toggleShuffle()" title="Shuffle">🔀</button>
      <button class="ctrl-btn" onclick="advanceQueue(-1)" title="Previous">⏮</button>
      <button id="play-pause-btn" class="ctrl-btn ctrl-play" onclick="togglePlayPause()">▶</button>
      <button class="ctrl-btn" onclick="advanceQueue(1)" title="Next">⏭</button>
      <button id="repeat-btn" class="ctrl-btn" onclick="toggleRepeat()" title="Repeat: Off">🔁</button>
    </div>
    <div class="progress-row">
      <span id="time-current" class="time-label">0:00</span>
      <div id="progress-bar" onclick="seekTo(event)">
        <div id="progress-fill"></div>
      </div>
      <span id="time-total" class="time-label">0:00</span>
    </div>
  </div>
  <div class="player-right">
    <div id="yt-player"></div>
    <button class="btn-queue-toggle" onclick="toggleQueuePanel()" title="Queue">☰</button>
  </div>
</div>

<!-- MODALS -->
<div id="playlist-modal" class="modal-overlay" onclick="closeModal()" style="display:none"></div>
<div id="toast" class="toast"></div>

<script src="https://www.youtube.com/iframe_api"></script>
<script src="app.js"></script>
</body>
</html>
